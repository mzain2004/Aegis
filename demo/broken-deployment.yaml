apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments
  template:
    metadata:
      labels:
        app: payments
    spec:
      containers:
        - name: payments
          image: nginx:1.25
          command: ["/bin/sh", "-c", "echo crashing && exit 1"]
          ports:
            - containerPort: 80
