name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Pytest, Ruff, Black, mypy
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pytest
        run: pytest -q

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: mypy
        run: mypy app tests
