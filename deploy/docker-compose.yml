# Vultr VPS stack (Ubuntu + Docker).
# Usage:
#   cp deploy/env.example deploy/.env
#   docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build

services:
  mcp:
    image: python:3.12-slim
    container_name: mcp-mock
    working_dir: /mcp
    volumes:
      - ./mock_mcp_server.py:/mcp/mock_mcp_server.py:ro
    command: ["python", "/mcp/mock_mcp_server.py", "--host", "0.0.0.0", "--port", "8000"]
    expose:
      - "8000"
    restart: unless-stopped

  proxy:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: mcp-proxy
    env_file:
      - .env
    environment:
      K8S_MCP_SERVER_URL: http://mcp:8000
      DATABASE_URL: sqlite:////app/data/aegis.db
    ports:
      - "9000:9000"
    volumes:
      - proxy-data:/app/data
    depends_on:
      - mcp
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  proxy-data:
